<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <!-- skoop-live-prescript -->
  <!-- skoop-live-runtime -->
  <script src="./skoop-live.js"></script>
  <script>
  // Skoop live-preview fetch shim — only active when dirty data is injected
  (function () {
    if (typeof window === 'undefined' || !window.__skoop_dirty_data__) return;
    var dirty = window.__skoop_dirty_data__;
    var origFetch = window.fetch ? window.fetch.bind(window) : null;
    window.fetch = function (input, init) {
      try {
        var url = typeof input === 'string' ? input : (input && input.url) || '';
        // Match bare 'data.json', './data.json', or any URL ending /data.json (with or without query)
        if (/(^|\/)data\.json(\?.*)?$/.test(url) || url === 'data.json') {
          var body = JSON.stringify(dirty);
          return Promise.resolve(new Response(body, {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          }));
        }
      } catch (e) {}
      return origFetch ? origFetch(input, init) : Promise.reject(new Error('fetch unavailable'));
    };
  })();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Preview Test Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container">

    <!-- SECTION 1 — Top Bar -->
    <header class="top-bar">
      <h1 class="app-title">Live Preview Test Panel</h1>
      <div class="date-display" id="date-display"></div>
    </header>

    <!-- SECTION 2 — Clock Widget -->
    <!-- The show/hide binding is directly on the container -->
    <div class="clock-widget" data-bind-show="app_settings.show_clock">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-label">Local Time</div>
    </div>

    <!-- SECTION 4 — Hero Banner -->
    <!-- Hero banner is always visible, uses data-bind-bg-image -->
    <section class="hero-banner" data-bind-bg-image="app_settings.hero_image">
      <div class="hero-content">
        <h2 data-bind-text="app_settings.hero_headline" data-bind-color="app_settings.hero_text_color"></h2>
        <p data-bind-text="app_settings.hero_subtitle"></p>
      </div>
    </section>

    <!-- SECTION 5 — Announcement Cards -->
    <!-- Data-bind-show handles whether the whole section is visible -->
    <section class="announcements-section" data-bind-show="app_settings.show_announcements">
      <!-- Data-bind-class switches between .display_mode-grid and .display_mode-list -->
      <div id="announcements-container" class="announcements-container" data-bind-class="app_settings.display_mode">
        <!-- Cards are injected here by JS -->
      </div>
    </section>

    <!-- SECTION 3 — Scrolling Ticker -->
    <!-- Using position fixed to always keep it at the bottom of the screen if needed, or flex layout -->
    <div class="ticker-strip" data-bind-show="app_settings.show_ticker">
      <div class="ticker-content" data-bind-text="app_settings.ticker_message"></div>
    </div>

  </div>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
